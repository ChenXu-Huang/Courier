name: Build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  generate-icons:
    name: Generate platform icons
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - name: Generate all icon formats
        run: uv run --script build/setup_icon.py --svg resources/icons/courier.svg --output dist/icon --all

      - name: Upload icons artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-icons
          path: dist/icon/
          retention-days: 1

  build:
    name: Build on ${{ matrix.os-short }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            os-short: windows
          - os: ubuntu-latest
            os-short: ubuntu
          - os: macos-latest
            os-short: macos
      fail-fast: false

    needs: generate-icons
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Download generated icons
        uses: actions/download-artifact@v7
        with:
          name: build-icons
          path: dist/icon/

      - name: Extract metadata
        run: |
          REF_NAME="${{ github.ref_name }}"
          if [[ "$REF_NAME" =~ ^v[0-9] ]]; then
            echo "CLEAN_VERSION=${REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "CLEAN_VERSION=0.0.1" >> "$GITHUB_ENV"
          fi

      - name: Build with Nuitka
        run: uv run nuitka --file-version=${{ env.CLEAN_VERSION }} main.py

      - name: Restructure package
        run: |
          if [ "${{ matrix.os-short }}" = "macos" ]; then
            DEST="dist/main.app/Contents/Resources"
          else
            DEST="dist/main.dist/resources"
          fi
          echo "Staging assets into ${DEST}..."
          mkdir -p "${DEST}"
          if [ -d "resources" ]; then cp -r resources/. "${DEST}/"; fi

      - name: Package archive
        run: |
          PROJECT_NAME="${{ github.event.repository.name }}"
          cd dist

          if [ "${{ matrix.os-short }}" = "macos" ]; then
            mv main.app "${PROJECT_NAME}.app"
            brew install create-dmg
            create-dmg \
              --volname "${PROJECT_NAME}" \
              --window-pos 200 120 \
              --window-size 500 300 \
              --icon-size 100 \
              --icon "${PROJECT_NAME}.app" 150 150 \
              --hide-extension "${PROJECT_NAME}.app" \
              --app-drop-link 350 150 \
              "${PROJECT_NAME}-${{ env.CLEAN_VERSION }}-${{ matrix.os-short }}.dmg" \
              "${PROJECT_NAME}.app"
            echo "DIST_FILE=dist/${PROJECT_NAME}-${{ env.CLEAN_VERSION }}-${{ matrix.os-short }}.dmg" >> "$GITHUB_ENV"

          elif [ "${{ matrix.os-short }}" = "windows" ]; then
            7z a "${PROJECT_NAME}-${{ env.CLEAN_VERSION }}-${{ matrix.os-short }}.zip" main.dist/
            echo "DIST_FILE=dist/${PROJECT_NAME}-${{ env.CLEAN_VERSION }}-${{ matrix.os-short }}.zip" >> "$GITHUB_ENV"

          else
            tar czf "${PROJECT_NAME}-${{ env.CLEAN_VERSION }}-${{ matrix.os-short }}.tar.gz" main.dist/
            echo "DIST_FILE=dist/${PROJECT_NAME}-${{ env.CLEAN_VERSION }}-${{ matrix.os-short }}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os-short }}
          path: ${{ env.DIST_FILE }}
          retention-days: 1

  release:
    name: Create Release
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: build-*
          path: dist/
          merge-multiple: true

      - name: Extract changelog for release
        id: changelog
        run: |
          CLEAN_VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$CLEAN_VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]") found=1
            }
            found
          ' docs/CHANGELOG.md > release_body.md
          grep "^\\[$CLEAN_VERSION\\]:" docs/CHANGELOG.md >> release_body.md

          if [ ! -s release_body.md ]; then
            echo "## Changelog" > release_body.md
            echo "Release for version ${{ github.ref_name }}. (No matching changelog entry found in CHANGELOG.md)" >> release_body.md
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          body_path: release_body.md
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
